<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>r8 diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f0c14;
      --bg-secondary: #15111a;
      --accent: #9d7de0;
      --accent-hover: #b79df0;
      --text-main: #e8e4ef;
      --text-muted: #7a6b8a;
      --glass-bg: rgba(21, 17, 26, 0.6);
      --glass-border: rgba(157, 125, 224, 0.08);
      --font-mono: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      overflow-x: hidden;
    }

    body {
      position: relative;
      padding-bottom: 20px;
    }

    #rain-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.12;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 30px 16px;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .title {
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      opacity: 0.6;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px 20px;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
      cursor: pointer;
      touch-action: manipulation;
    }

    .note-card:hover {
      border-color: rgba(157, 125, 224, 0.2);
      transform: translateY(-1px);
    }

    .note-card.active {
      border-color: rgba(157, 125, 224, 0.3);
      background: rgba(21, 17, 26, 0.8);
    }

    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .note-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-main);
      line-height: 1.4;
      flex: 1;
    }

    .note-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      opacity: 0.7;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .note-body {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .note-card.active .note-body {
      -webkit-line-clamp: unset;
      display: block;
      overflow: visible;
      color: var(--text-main);
    }

    .note-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .note-card.active .note-footer {
      opacity: 1;
    }

    .forum-link {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      font-family: var(--font-mono);
      padding: 6px 12px;
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      transition: all 0.15s ease;
    }

    .forum-link:hover {
      background: rgba(157, 125, 224, 0.1);
      border-color: rgba(157, 125, 224, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 1rem;
      opacity: 0.5;
    }

    .footer {
      text-align: center;
      padding-top: 50px;
      color: var(--text-muted);
      font-size: 1rem;
      opacity: 0.3;
    }

    /* Mobile styles */
    @media (max-width: 640px) {
      .container {
        padding: 20px 12px;
      }

      .title {
        font-size: 1.6rem;
      }

      .subtitle {
        font-size: 0.8rem;
      }

      .note-card {
        padding: 14px 16px;
        border-radius: 10px;
      }

      .note-title {
        font-size: 1rem;
      }

      .note-body {
        font-size: 0.9rem;
        -webkit-line-clamp: 3;
      }

      .note-date {
        font-size: 0.7rem;
      }
    }

    /* Tablet */
    @media (min-width: 641px) and (max-width: 1024px) {
      .container {
        max-width: 90%;
        padding: 25px 20px;
      }
    }

    /* Desktop large */
    @media (min-width: 1440px) {
      .container {
        max-width: 800px;
      }

      .title {
        font-size: 2.2rem;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(122, 107, 138, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(122, 107, 138, 0.5);
    }

    /* Touch feedback */
    .note-card:active {
      transform: scale(0.99);
      background: rgba(21, 17, 26, 0.9);
    }
  </style>
</head>
<body>
  <canvas id="rain-canvas"></canvas>
  
  <div class="container">
    <header class="header">
      <h1 class="title">r8</h1>
      <p class="subtitle">public diary</p>
    </header>
    
    <main class="notes-list" id="notes-list">
      <div class="empty-state">
        <p>Loading...</p>
      </div>
    </main>
    
    <footer class="footer">
      <p>∞</p>
    </footer>
  </div>

  <script>
    // Rain animation
    const canvas = document.getElementById('rain-canvas');
    const ctx = canvas.getContext('2d');
    let animationId;
    let raindrops = [];

    class Raindrop {
      constructor(canvasWidth, canvasHeight) {
        this.x = Math.random() * canvasWidth;
        this.y = Math.random() * canvasHeight - canvasHeight;
        this.length = Math.random() * 15 + 8;
        this.speed = Math.random() * 1.5 + 0.8;
        this.opacity = Math.random() * 0.2 + 0.12;
      }

      update(canvasWidth, canvasHeight) {
        this.y += this.speed;
        if (this.y > canvasHeight) {
          this.y = -this.length;
          this.x = Math.random() * canvasWidth;
        }
      }

      draw(ctx) {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x, this.y + this.length);
        ctx.strokeStyle = `rgba(169, 180, 220, ${this.opacity})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      raindrops = [];
      // Fewer drops on mobile for performance
      const dropCount = window.innerWidth < 640 ? 40 : 60;
      for (let i = 0; i < dropCount; i++) {
        raindrops.push(new Raindrop(canvas.width, canvas.height));
      }
    }

    resize();
    window.addEventListener('resize', resize);

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      raindrops.forEach(drop => {
        drop.update(canvas.width, canvas.height);
        drop.draw(ctx);
      });
      animationId = requestAnimationFrame(animate);
    }

    animate();

    // Load notes
    let allNotes = [];
    let activeNoteId = null;

    async function loadNotes() {
      try {
        const response = await fetch('notes.json');
        allNotes = await response.json();
        
        const container = document.getElementById('notes-list');
        
        if (allNotes.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No entries yet...</p></div>';
          return;
        }

        // Sort by date, newest first
        allNotes.sort((a, b) => b.createdAt - a.createdAt);

        renderNotes();
      } catch (err) {
        console.error('Failed to load notes:', err);
        document.getElementById('notes-list').innerHTML = '<div class="empty-state"><p>Failed to load notes</p></div>';
      }
    }

    function renderNotes() {
      const container = document.getElementById('notes-list');
      
      container.innerHTML = allNotes.map(note => {
        const date = new Date(note.createdAt).toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          year: 'numeric'
        });
        
        const isActive = activeNoteId === note.id;
        
        return `
          <div class="note-card ${isActive ? 'active' : ''}" data-id="${escapeHtml(note.id)}" onclick="toggleNote('${escapeHtml(note.id)}')">
            <div class="note-header">
              <h3 class="note-title">${escapeHtml(note.title)}</h3>
              <span class="note-date">${date}</span>
            </div>
            <p class="note-body">${escapeHtml(note.body)}</p>
            ${note.threadUrl ? `
              <div class="note-footer">
                <a href="${note.threadUrl}" target="_blank" rel="noopener" class="forum-link" onclick="event.stopPropagation()">view on forum →</a>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function toggleNote(noteId) {
      if (activeNoteId === noteId) {
        activeNoteId = null;
      } else {
        activeNoteId = noteId;
      }
      renderNotes();
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return '';
      const div = document.createElement('div');
      div.textContent = String(text);
      return div.innerHTML;
    }

    // Close note when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.note-card')) {
        activeNoteId = null;
        renderNotes();
      }
    });

    loadNotes();
  </script>
</body>
</html>
