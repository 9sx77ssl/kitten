<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>r8 diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f0c14;
      --bg-secondary: #15111a;
      --accent: #9d7de0;
      --accent-hover: #b79df0;
      --text-main: #e8e4ef;
      --text-muted: #7a6b8a;
      --glass-bg: rgba(21, 17, 26, 0.6);
      --glass-border: rgba(157, 125, 224, 0.08);
      --font-mono: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      overflow-x: hidden;
    }

    body {
      position: relative;
    }

    #rain-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      opacity: 0.6;
    }

    .notes-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .note-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      transition: border-color 0.15s ease;
    }

    .note-card:hover {
      border-color: rgba(157, 125, 224, 0.15);
    }

    .note-content {
      flex: 1;
      min-width: 0;
    }

    .note-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-body {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
    }

    .note-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .note-date {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      opacity: 0.7;
    }

    .forum-link {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      opacity: 0.5;
      transition: opacity 0.15s ease;
    }

    .forum-link:hover {
      opacity: 1;
      color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      opacity: 0.5;
    }

    .footer {
      text-align: center;
      padding-top: 40px;
      color: var(--text-muted);
      font-size: 0.8rem;
      opacity: 0.3;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(122, 107, 138, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(122, 107, 138, 0.5);
    }
  </style>
</head>
<body>
  <canvas id="rain-canvas"></canvas>
  
  <div class="container">
    <header class="header">
      <h1 class="title">r8</h1>
      <p class="subtitle">public diary</p>
    </header>
    
    <main class="notes-list" id="notes-list">
      <div class="empty-state">
        <p>Loading...</p>
      </div>
    </main>
    
    <footer class="footer">
      <p>∞</p>
    </footer>
  </div>

  <script>
    // Rain animation
    const canvas = document.getElementById('rain-canvas');
    const ctx = canvas.getContext('2d');
    let animationId;
    let raindrops = [];

    class Raindrop {
      constructor(canvasWidth, canvasHeight) {
        this.x = Math.random() * canvasWidth;
        this.y = Math.random() * canvasHeight - canvasHeight;
        this.length = Math.random() * 15 + 8;
        this.speed = Math.random() * 1.5 + 0.8;
        this.opacity = Math.random() * 0.2 + 0.12;
      }

      update(canvasWidth, canvasHeight) {
        this.y += this.speed;
        if (this.y > canvasHeight) {
          this.y = -this.length;
          this.x = Math.random() * canvasWidth;
        }
      }

      draw(ctx) {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x, this.y + this.length);
        ctx.strokeStyle = `rgba(169, 180, 220, ${this.opacity})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      raindrops = [];
      for (let i = 0; i < 60; i++) {
        raindrops.push(new Raindrop(canvas.width, canvas.height));
      }
    }

    resize();
    window.addEventListener('resize', resize);

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      raindrops.forEach(drop => {
        drop.update(canvas.width, canvas.height);
        drop.draw(ctx);
      });
      animationId = requestAnimationFrame(animate);
    }

    animate();

    // Load notes
    async function loadNotes() {
      try {
        const response = await fetch('notes.json');
        const notes = await response.json();
        
        const container = document.getElementById('notes-list');
        
        if (notes.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No entries yet...</p></div>';
          return;
        }

        container.innerHTML = notes.map(note => {
          const date = new Date(note.createdAt).toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric'
          });
          
          return `
            <div class="note-card">
              <div class="note-content">
                <h3 class="note-title">${escapeHtml(note.title)}</h3>
                <p class="note-body">${escapeHtml(note.body)}</p>
              </div>
              <div class="note-meta">
                <span class="note-date">${date}</span>
                ${note.threadUrl ? `<a href="${note.threadUrl}" target="_blank" rel="noopener" class="forum-link">forum</a>` : ''}
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Failed to load notes:', err);
        document.getElementById('notes-list').innerHTML = '<div class="empty-state"><p>Failed to load notes</p></div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadNotes();
  </script>
</body>
</html>
